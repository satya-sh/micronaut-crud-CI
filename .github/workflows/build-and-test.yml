name: Build and Test with MySQL

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: mn_playground
          MYSQL_ROOT_PASSWORD: Airjorda7
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -pmy-secret-pw" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 3

    env:
      DATASOURCES_DEFAULT_URL: "jdbc:mysql://127.0.0.1:3306/mn_playground?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true"
      DATASOURCES_DEFAULT_USERNAME: "root"
      DATASOURCES_DEFAULT_PASSWORD: "Airjorda7"

    steps:
      - name: Test MySQL Connection
        run: | 
          mysql -h 127.0.0.1 -uroot -pAirjorda7 -e "SHOW DATABASES;" mn_playground

      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant permission to execute gradlew
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew clean build
